<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriken - Giriş Sistemi</title>
    <link rel="icon" type="image/jpeg" href="WhatsApp Image 2026-04-15 at 11.48.33.jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div id="loginCard">
        <div class="header-shape">
            <img src="WhatsApp Image 2026-04-15 at 11.48.33.jpeg" alt="Logo" class="login-logo">
        </div>
        <div class="content">
            <h2 class="title">Biriken</h2>
            <p class="subtitle">Varlıklarını güvenle takip et</p>
            <div class="form-container">
                <form id="loginForm">
                    <div class="input-wrapper">
                        <input type="text" id="loginUser" placeholder="Kullanıcı Adı" required>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="loginPass" placeholder="Şifre" required>
                    </div>
                    <div class="form-links">
                        <a href="javascript:void(0)" onclick="openModal('forgotModal')">Şifremi Unuttum</a>
                        <a href="javascript:void(0)" onclick="openModal('registerModal')" class="highlight">Hesap Oluştur</a>
                    </div>
                    <button type="submit" class="btn-primary">Giriş Yap</button>
                </form>
            </div>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Hesap Oluştur</h3>
                <span class="close-btn" onclick="closeModals()">&times;</span>
            </div>
            <form id="regForm">
                <input type="text" id="regUser" placeholder="Kullanıcı Adı" minlength="3" required>
                <input type="email" id="regEmail" placeholder="E-posta" required>
                <input type="password" id="regPass" placeholder="Şifre (8+ karakter)" minlength="8" required>
                <input type="password" id="regConfirm" placeholder="Şifre Tekrar" required>
                <button type="submit" class="btn-primary">Kaydı Tamamla</button>
            </form>
        </div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Şifre Yenileme</h3>
                <span class="close-btn" onclick="closeModals()">&times;</span>
            </div>
            <div id="step1">
                <p class="sub-text">Kayıtlı bilgilerinizi girin</p>
                <input type="text" id="forgetName" placeholder="Kullanıcı Adı" required>
                <input type="email" id="forgetEmail" placeholder="E-posta" required>
                <button onclick="verifyUser()" class="btn-primary">Sorgula</button>
            </div>
            <div id="step2" style="display: none;">
                <p class="sub-text">Yeni şifrenizi belirleyin</p>
                <input type="password" id="newPass" placeholder="Yeni Şifre" minlength="8" required>
                <button onclick="saveNewPassword()" class="btn-success">Güncelle</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('show'); }, 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => { container.removeChild(toast); }, 300);
            }, 3000);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
        }

        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            if(pass !== confirm) { showToast("Şifreler eşleşmiyor!", "error"); return; }
            if(localStorage.getItem('db_' + user)) { showToast("Kullanıcı adı kullanımda!", "error"); return; }
            localStorage.setItem('db_' + user, JSON.stringify({ user, email, pass }));
            showToast("Hesap başarıyla oluşturuldu!", "success");
            setTimeout(closeModals, 1000);
        };

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const account = localStorage.getItem('db_' + user);
            if (account) {
                const data = JSON.parse(account);
                if (data.pass === pass) {
                    showToast("Giriş yapılıyor...", "success");
                    localStorage.setItem('aktifKullanici', user); 
                    setTimeout(() => { window.location.href = "anasayfa.html"; }, 800);
                } else { showToast("Hatalı şifre!", "error"); }
            } else { showToast("Hesap bulunamadı!", "error"); }
        };

        let resetUser = "";
        function verifyUser() {
            const name = document.getElementById('forgetName').value;
            const email = document.getElementById('forgetEmail').value;
            const account = localStorage.getItem('db_' + name);
            if (account && JSON.parse(account).email === email) {
                resetUser = name;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                showToast("Kimlik doğrulandı.", "success");
            } else { showToast("Bilgiler hatalı!", "error"); }
        }

        function saveNewPassword() {
            const newP = document.getElementById('newPass').value;
            if (newP.length < 8) { showToast("Şifre yetersiz!", "error"); return; }
            let data = JSON.parse(localStorage.getItem('db_' + resetUser));
            data.pass = newP;
            localStorage.setItem('db_' + resetUser, JSON.stringify(data));
            showToast("Şifre güncellendi!", "success");
            setTimeout(closeModals, 1000);
        }
    </script>

</body>
</html>
