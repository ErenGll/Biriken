<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayarlar | Biriken Finans</title>
    <link rel="stylesheet" href="ayarlar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
</head>
<body>

    <div class="settings-container">
        <div class="header-bar">
            <button class="back-btn" onclick="window.history.back()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Geri Dön
            </button>
            <h2>Sistem Ayarları</h2>
            <div style="width: 100px;"></div> 
        </div>

        <div class="settings-card">
            <div class="settings-section">
                <h3>Görünüm ve Tema</h3>
                <p>Biriken Finans arayüzünü hangi renk tonlarında kullanmak istediğinizi seçin. Varsayılan olarak Açık Tema aktiftir.</p>
                
                <div class="theme-options">
    <div class="theme-box" id="theme-light" onclick="setTheme('light')">
        <div class="theme-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </div>
        <h4>Light Mode</h4>
        <span>Berrak ve aydınlık arayüz</span>
    </div>

    <div class="theme-box" id="theme-dark" onclick="setTheme('dark')">
        <div class="theme-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </div>
        <h4>Dark Mode</h4>
        <span>Odaklanmayı artıran koyu tonlar</span>
    </div>
</div>
            </div>
        </div>
    </div>
<script src="config.js"></script>
<script src="script.js"></script>
    <script>
        const API_URL = "https://biriken-api.onrender.com/api";
        document.addEventListener('DOMContentLoaded', () => {
            // Hangi tema aktifse onun kartını işaretle
            const currentTheme = localStorage.getItem('theme') || 'light';
            document.getElementById(`theme-${currentTheme}`).classList.add('active-theme');
        });

        function setTheme(themeType) {
            // Önceki seçimleri temizle
            document.getElementById('theme-light').classList.remove('active-theme');
            document.getElementById('theme-dark').classList.remove('active-theme');
            
            // Yeni seçimi aktif yap
            document.getElementById(`theme-${themeType}`).classList.add('active-theme');

            if (themeType === 'dark') {
                document.documentElement.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
</body>
</html>
